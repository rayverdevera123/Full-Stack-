<!DOCTYPE html>
<html>
<head>
    <title>Frontend</title>
</head>
<body>

    <h1>Frontend Page</h1>
    <button onclick="getMessage()">Get Message from Backend</button>

    <p id="output"></p>

    <script>
        function getMessage() {
            fetch('http://localhost:5000/')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('output').innerText = data;
                })
                .catch(error => {
                    console.error(error);
                });
        }
    </script>

</body>
</html>
